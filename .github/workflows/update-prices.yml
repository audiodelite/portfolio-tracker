name: Update Prices

on:
  schedule:
    - cron: '30 21 * * 1-5'  # 4:30 PM ET (21:30 UTC) weekdays after market close
  workflow_dispatch: # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch prices and update
        run: node update-prices.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || (git commit -m "Update prices $(date -u +%Y-%m-%d)" && git push)
